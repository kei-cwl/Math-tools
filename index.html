<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS Cosine Rule Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #result-box { margin-top: 1.5rem; padding: 15px; border-radius: 6px; display: none; text-align: center; }
        .success { background-color: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
        .error { background-color: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
    </style>
</head>
<body>

<div class="card">
    <h2>SAS Cosine Calculator</h2>
    
    <div class="input-group">
        <label>Side length (a):</label>
        <input type="number" id="sideA" placeholder="e.g. 5" step="any">
    </div>

    <div class="input-group">
        <label>Side length (b):</label>
        <input type="number" id="sideB" placeholder="e.g. 7" step="any">
    </div>

    <div class="input-group">
        <label>Included Angle (degrees):</label>
        <input type="number" id="angleC" placeholder="e.g. 45" step="any">
    </div>

    <button onclick="calculateSide()">Find Side c</button>

    <div id="result-box">
        <strong>Result:</strong> <span id="output"></span>
    </div>
</div>

<script>
    function calculateSide() {
        const a = parseFloat(document.getElementById('sideA').value);
        const b = parseFloat(document.getElementById('sideB').value);
        const angleDeg = parseFloat(document.getElementById('angleC').value);
        const resultBox = document.getElementById('result-box');
        const output = document.getElementById('output');

        if (isNaN(a) || isNaN(b) || isNaN(angleDeg) || a <= 0 || b <= 0 || angleDeg <= 0 || angleDeg >= 180) {
            resultBox.style.display = 'block';
            resultBox.className = 'error';
            output.innerText = "Please enter valid positive numbers. Angle must be < 180°.";
            return;
        }

        // Convert degrees to radians
        const angleRad = angleDeg * (Math.PI / 180);

        // Law of Cosines: c^2 = a^2 + b^2 - 2ab * cos(C)
        const cSquared = Math.pow(a, 2) + Math.pow(b, 2) - (2 * a * b * Math.cos(angleRad));
        const c = Math.sqrt(cSquared);

        resultBox.style.display = 'block';
        resultBox.className = 'success';
        output.innerText = "Side c ≈ " + c.toFixed(4);
    }
</script>

</body>
</html>
